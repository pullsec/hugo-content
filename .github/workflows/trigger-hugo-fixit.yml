name: Trigger Hugo FixIt rebuild

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hugo-fixit workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.HUGO_FIXIT_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/pullsec/hugo-fixit/dispatches \
            -d '{"event_type":"content-updated"}'
